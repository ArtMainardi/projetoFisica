<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jaraguá Custom Motors - Painel Inicial</title>
    <link rel="stylesheet" href="index-style.css"> 
</head>
<body>

    <header class="main-header">
        <h1>Jaraguá Custom Motors</h1>
        <p>Central de Contratos - Aniversário de Jaraguá do Sul</p>
    </header>

    <main class="map-dashboard">
        
        <section class="map-container">
            <img src="mapaJaragua.jpg" alt="Mapa de Jaraguá do Sul" class="map-image">

            <button class="map-pin pin-chiesetta" onclick="selecionarMissao(1)">📍</button>
            <button class="map-pin pin-viaverde" onclick="selecionarMissao(2)">📍</button>
            <button class="map-pin pin-scar" onclick="selecionarMissao(3)">📍</button>
            <button class="map-pin pin-rodoviaria" onclick="selecionarMissao(4)">📍</button>
        </section>

        <section class="info-sidebar" id="sidebar-missao">
            <div id="conteudo-vazio">
                <h3>Central de Comando</h3>
                <p>Clique em um dos marcadores (📍) no mapa de Jaraguá do Sul para visualizar os detalhes do contrato de engenharia.</p>
            </div>
            
            <div id="conteudo-missao" style="display: none;">
                <h3 id="sidebar-titulo">Nome da Missão</h3>
                <img id="sidebar-imagem" src="" alt="Local">
                <p id="sidebar-desafio" class="tag-physics">Desafio: </p>
                <p id="sidebar-descricao">Descrição do problema...</p>
                
                <a href="#" id="sidebar-botao" class="btn-contract">Iniciar Simulação</a>
            </div>
        </section>

    </main>

    <script src="index-script.js"></script>
</body>
</html>
